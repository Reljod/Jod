# Commit + hook convention — sourced by the git hooks in this directory.
# This file is plain POSIX shell variable assignments. It is version
# controlled, so edits here apply to everyone on the next clone/install.

# --- commit-msg gate -------------------------------------------------------

# Allowed commit types (extended-regex alternation, no spaces).
ALLOWED_TYPES="feat|fix|bug|chore|docs|refactor|test|perf|ci|build|style|revert"

# Ticket key regex. Default matches Linear-style keys: an upper-case team
# prefix, a dash, and a number (ENG-123, JOD-42, PLATFORM-7).
TICKET_REGEX="[A-Z][A-Z0-9]+-[0-9]+"

# Types that do NOT require a ticket reference. Housekeeping commits that
# rarely map to a ticket. Everything else must carry a ticket key.
TICKET_EXEMPT_TYPES="chore|docs|style|ci"

# Hard cap on the subject line length. 0 disables the check.
MAX_SUBJECT_LENGTH=72

# --- pre-commit ------------------------------------------------------------
# Newline-separated commands run by the pre-commit hook when no external
# hook manager (lefthook / pre-commit framework) is detected. Keep these
# FAST and scoped to staged files. The installer pre-fills sensible
# defaults for the detected ecosystem; edit freely.
PRECOMMIT_CMDS=""

# --- pre-push --------------------------------------------------------------
# Newline-separated commands run by the pre-push hook. Empty = disabled.
# Only enable for a genuinely quick suite; slow gates push people toward
# --no-verify. Heavy tests belong in CI.
PREPUSH_CMDS=""
